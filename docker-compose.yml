version: "3.9"

services:
  sop-vision:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sop-vision
    ports:
      - "8501:8501"
    volumes:
      - ./configs:/app/configs:ro
      - ./models:/app/models:ro
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
